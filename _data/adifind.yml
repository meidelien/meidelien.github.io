downloads:
  svs:
    label: "Download example .svs"
    path: "/files/adifind/K106942.svs"
  validation_zip:
    label: "Download example results"
    path: "/files/adifind/K106942_AdiFind.zip"

processing_section:
  workflow_panels:
    - title: "Whole-slide image pyramid"
      image_path: "/images/adifind/Asset 1@4x.png"
      image_alt: "Whole-slide image pyramid illustrating multi-resolution access from downscaled to full-resolution tissue."
      description: "Move between whole-slide context and full-resolution adipocyte analysis using a multi-resolution image pyramid."

    - title: "Downscaled 1X overview"
      image_path: "/images/adifind/Asset 14@4x.png"
      image_alt: "Downscaled 1X overview used for tumour detection and tissue guidance."
      description: "Use a downscaled 1X overview for tumour detection and tissue guidance before high-resolution analysis."

    - title: "Full-resolution preprocessing"
      image_path: "/images/adifind/Asset 13@4x.png"
      image_alt: "Full-resolution preprocessing showing raw, inverted, Sobel-enhanced, and adipocyte-detection stages."
      description: "Preprocess full-resolution tissue windows to enhance adipocyte boundaries before detection."

    - title: "Sliding-window inference"
      image_path: "/images/adifind/Asset 3@4x.png"
      image_alt: "Sliding-window inference with overlapping windows and reconciled adipocyte detections."
      description: "Run sliding-window inference across guided tissue regions and reconcile overlapping detections."

  annotated_panel:
    title: "Annotated whole-slide output"
    image_path: "/images/adifind/Asset 29@4x.png"
    image_alt: "Annotated whole-slide image with tumour and adipose tissue context."
    description: "This annotated whole-slide image is the primary visual output of AdiFind, providing tumour and adipose tissue context for review and downstream validation."

details:
  gui_overview:
    title: "GUI overview"
    description: "Configure analysis settings, load optional ROIs, and run the AdiFind processing workflow from the desktop interface."
    image_path: "/images/adifind/paper_adifind_GUI.png"
    image_alt: "Screenshot of the AdiFind graphical user interface."
    caption: "Desktop interface for configuring and running analysis."

  roi_demo:
    - title: "ROI selection"
      description: "Define a freehand region of interest to restrict analysis to a selected tissue area."
      image_path: "/images/adifind/paper_ROI_frehand.png"
      image_alt: "Freehand ROI selection before annotations are applied."
      caption: "Freehand ROI selection in the AdiFind viewer."

    - title: "ROI annotated output"
      description: "Review the generated adipocyte annotations within the same selected ROI."
      image_path: "/images/adifind/paper_ROI_frehand_annotated.png"
      image_alt: "Annotated ROI view showing the generated analysis output."
      caption: "Annotated output for the selected ROI."

  qupath_demo:
    - title: "Import results to QuPath "
      description: "Inspect exported AdiFind annotations across the processed tissue region in QuPath."
      image_path: "/images/adifind/AdiFind_QuPath_demo.png"
      image_alt: "QuPath overview displaying imported AdiFind annotations on the example slide."
      caption: "AdiFind + QuPath = 🤝"

    - title: "QuPath close-up"
      description: "Examine individual or groups adipocytes and adipocyte labels at higher magnification in QuPath."
      image_path: "/images/adifind/AdiFind_QuPath_demo_zoomed_in.png"
      image_alt: "Zoomed QuPath view showing individual AdiFind adipocyte annotations."
      caption: "Higher-magnification review in QuPath."
