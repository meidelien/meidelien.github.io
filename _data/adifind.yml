downloads:
  svs:
    label: "Download example .svs"
    path: "/files/adifind/K106942.svs"
  validation_zip:
    label: "Download example results"
    path: "/files/adifind/K106942_AdiFind_example_results.zip"

processing_section:
  workflow_panels:
    - panel_label: "A"
      title: "Whole-slide image pyramid"
      image_path: "/images/adifind/Asset 1@4x.png"
      image_alt: "Whole-slide image pyramid illustrating multi-resolution access from downscaled to full-resolution tissue."
      description: "Build a multi-resolution whole-slide image pyramid so the workflow can switch between rapid low-magnification context and full-resolution adipocyte analysis."

    - panel_label: "B"
      title: "Downscaled 1X overview"
      image_path: "/images/adifind/Asset 14@4x.png"
      image_alt: "Downscaled 1X overview used for tumour detection and tissue guidance."
      description: "Use a downscaled 1X overview for tumour detection and tissue guidance before the high-resolution inference stage begins."

    - panel_label: "C"
      title: "Full-resolution preprocessing"
      image_path: "/images/adifind/Asset 13@4x.png"
      image_alt: "Full-resolution preprocessing showing raw, inverted, Sobel-enhanced, and adipocyte-detection stages."
      description: "At full resolution, invert and enhance tissue regions to highlight adipocyte boundaries and prepare local windows for robust adipocyte detection."

    - panel_label: "D"
      title: "Sliding-window inference"
      image_path: "/images/adifind/Asset 3@4x.png"
      image_alt: "Sliding-window inference with overlapping windows and reconciled adipocyte detections."
      description: "Run sliding-window inference across the tissue region and reconcile overlapping detections across neighbouring windows."

  outcome_panels:
    - title: "Annotated whole-slide output"
      image_path: "/images/adifind/Asset 29@4x.png"
      image_alt: "Annotated whole-slide image with tumour and adipose tissue context and a zoomed tumour-distance inset."
      description: "Generate an annotated whole-slide output that combines tumour context, adipose annotation overlays, and tumour-distance-aware review views."

    - title: "Distance-region map"
      image_path: "/images/adifind/Distance_region_map@4x.png"
      image_alt: "Distance-region map showing proximal, intermediate, and distal adipose compartments relative to the tumour."
      description: "Map proximal, intermediate, and distal adipose regions relative to the tumour boundary to support distance-aware adipocyte summarisation."

details:
  gui_overview:
    title: "GUI overview"
    description: "Overview of the AdiFind desktop software used to configure analysis settings, load ROIs, and run the processing pipeline."
    image_path: "/images/adifind/paper_adifind_GUI.png"
    image_alt: "Screenshot of the AdiFind graphical user interface."
    caption: "GUI view from the AdiFind workflow."

  roi_demo:
    - title: "ROI tool demonstration"
      description: "Demonstration of how the slide looks when using the ROI tool to define a freehand region for analysis."
      image_path: "/images/adifind/paper_ROI_frehand.png"
      image_alt: "Freehand ROI tool demonstration before annotations are applied."
      caption: "Demonstration of the ROI tool in use."

    - title: "ROI results demonstration"
      description: "Demonstration of the resulting analysis output, showing how the same ROI looks once the annotation results have been generated."
      image_path: "/images/adifind/paper_ROI_frehand_annotated.png"
      image_alt: "Annotated ROI demonstration showing the resulting analysis output."
      caption: "Demonstration of the resulting annotated output."

  qupath_demo:
    - title: "QuPath overview"
      description: "Whole-slide QuPath review showing imported AdiFind annotations across the processed tissue region for pathology-facing validation."
      image_path: "/images/adifind/AdiFind_QuPath_demo.png"
      image_alt: "QuPath overview displaying imported AdiFind annotations on the example slide."
      caption: "Whole-slide validation view in QuPath."

    - title: "QuPath zoomed validation"
      description: "Zoomed QuPath review showing individual adipocyte boundaries and labels for close inspection of exported annotations."
      image_path: "/images/adifind/AdiFind_QuPath_demo_zoomed_in.png"
      image_alt: "Zoomed QuPath view showing individual AdiFind adipocyte annotations."
      caption: "Zoomed validation view in QuPath."
